        }
        
        .sticky-bar { 
            position: fixed; bottom: 0; width: 100%; display: flex; 
            justify-content: space-around; background: #002244; 
            padding: 12px 0; border-top: 2px solid #ffcc00; z-index: 1000;
        }
        .sticky-bar a { color: #ffcc00; text-decoration: none; font-weight: bold; font-size: 12px; }

        @media (min-width: 768px) {
            nav a { font-size: 16px; margin: 0 15px; }

        }
