<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Office Location | S M METAL</title>
    <style>
        body { 
            font-family: 'Segoe UI', sans-serif; 
            background: #011539; 
            margin: 0; 
            padding-top: 80px; /* फिक्स्ड नव के लिए जगह */
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            color: white; 
        }

        /* Fixed Navigation */
        nav { 
            background: rgba(0, 26, 51, 0.95); 
            padding: 20px 0; 
            text-align: center; 
            position: fixed; 
            top: 0; 
            width: 100%; 
            z-index: 1000; 
            border-bottom: 3px solid #ffcc00; 
            backdrop-filter: blur(5px);
        }
        nav a { color: #ffcc00; margin: 0 15px; text-decoration: none; font-weight: bold; }

        /* Map Container Animation */
        .map-wrapper {
            width: 90%;
            max-width: 800px;
            padding: 10px;
            background: white;
            border-radius: 15px;
            box-shadow: 0 0 20px rgba(255, 204, 0, 0.5);
            animation: fadeIn 1.5s ease-in-out;
            margin-top: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }

        .map-container {
            position: relative;
            width: 100%;
            padding-bottom: 56.25%; /* 16:9 Aspect Ratio */
            height: 0;
            overflow: hidden;
            border-radius: 10px;
        }

        .map-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        .back-btn { margin-top: 30px; padding: 12px 25px; background: #ffcc00; color: #011539; text-decoration: none; font-weight: bold; border-radius: 5px; transition: 0.3s; }
        .back-btn:hover { background: white; transform: scale(1.05); }
    </style>
</head>
<body>

    <nav>
        <a href="index.html">HOME</a>
        <a href="index.html#products">PRODUCTS</a>
        <a href="about.html">ABOUT US</a>
        <a href="contact.html">CONTACT</a>
    </nav>

    <h1 style="margin-top: 20px;">OUR OFFICE LOCATION</h1>

    <div class="map-wrapper">
        <div class="map-container">
            <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d406.67615934481!2d72.62789216381833!3d23.01691546729261!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x395e8742d776d6d9%3A0xf88d412e1e36fe47!2sS%20M%20METAL!5e1!3m2!1shi!2sin!4v1773288981702!5m2!1shi!2sin" 
                    allowfullscreen="" 
                    loading="lazy" 
                    referrerpolicy="no-referrer-when-downgrade">
            </iframe>
        </div>
    </div>

    <a href="index.html" class="back-btn">← Back to Home</a>

</body>
</html>
