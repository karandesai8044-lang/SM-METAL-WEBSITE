<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>S M METAL | Best Stainless Steel Supplier in Ahmedabad</title>
    <link rel="icon" href="LOGO.jpeg" type="image/jpeg">
    <meta name="description" content="S M METAL Ahmedabad is a leading manufacturer, stockist, and supplier of SS Sheets, Pipes, Plates, and Fittings.">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
    <style>
        * { box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; color: #333; background: #f9f9f9; overflow-x: hidden; width: 100%; }
        
        #loader { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #011539; z-index: 9999; display: flex; justify-content: center; align-items: center; }
        .spinner { width: 60px; height: 60px; border: 6px solid #ffcc00; border-top: 6px solid transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        .top-bar { background: #002244; color: white; padding: 10px 20px; display: flex; justify-content: space-between; font-size: 13px; flex-wrap: wrap; text-align: center; }
        .hero-section { background: linear-gradient(rgba(1, 21, 57, 0.85), rgba(1, 21, 57, 0.85)), url('shope5.jpg'); background-size: cover; padding: 60px 20px; text-align: center; color: white; }
        .hero-title { font-size: clamp(25px, 5vw, 45px); margin-bottom: 15px; text-transform: uppercase; }
        .cta-btn { background: #ffcc00; color: #002244; padding: 12px 25px; text-decoration: none; font-weight: 800; border-radius: 5px; display: inline-block; }

        .custom-header { background: #011539; padding: 20px 10px; text-align: center; border-bottom: 8px solid #ffcc00; }
        .header-content { display: flex; flex-direction: column; align-items: center; gap: 15px; }
        .logo-circle { width: 80px; height: 80px; background: #ffcc00; border-radius: 50%; border: 3px solid #fff; object-fit: cover; }
        .brand-name { font-size: 30px; color: #fff; margin: 0; }
        
        nav { background: #011539; position: sticky; top: 0; z-index: 1000; padding: 10px 0; }
        .nav-container { display: none; flex-direction: column; text-align: center; background: #011539; }
        .nav-container.active { display: flex; }
        nav a { color: #fff; padding: 10px; text-decoration: none; font-weight: bold; }
        .menu-btn { display: block; color: #ffcc00; cursor: pointer; padding: 10px; font-weight: bold; }

        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; padding: 20px; max-width: 1200px; margin: auto; }
        .product-card { background: white; padding: 15px; border-radius: 12px; border: 1px solid #ddd; }
        .product-card img { width: 100%; height: 150px; object-fit: cover; border-radius: 8px; }

        .whatsapp-float { position: fixed; bottom: 20px; right: 20px; background: #25d366; padding: 15px; border-radius: 50px; z-index: 1001; }
        iframe { width: 100%; max-width: 560px; height: auto; aspect-ratio: 16/9; }

        @media (min-width: 768px) {
            .nav-container { display: flex !important; flex-direction: row; justify-content: center; gap: 30px; }
            .menu-btn { display: none; }
        }
    </style>
</head>
<body>

<div id="loader"><div class="spinner"></div></div>

<div class="top-bar"><span>Email: smmetal4576@gmail.com</span><span>Call: +91 74359 90213</span></div>

<div class="hero-section">
    <h1 class="hero-title">STAINLESS STEEL EXCELLENCE</h1>
    <a href="#products" class="cta-btn">View Our Products</a>
</div>

<header class="custom-header">
    <div class="header-content">
        <img src="LOGO.jpeg" alt="Logo" class="logo-circle">
        <h1 class="brand-name">S M METAL</h1>
    </div>
</header>

<nav>
    <div class="menu-btn" onclick="toggleMenu()">☰ MENU</div>
    <div class="nav-container" id="navMenu">
        <a href="index.html">HOME</a>
        <a href="#products">PRODUCTS</a>
        <a href="contact.html">CONTACT</a>
        <a href="about.html">ABOUT US</a>
    </div>
</nav>

<div id="products" class="product-grid">
    <div class="product-card"><a href="SS Sheet.html" style="text-decoration:none; color:inherit;"><img src="SS Sheet .jpg"><h3>SS Sheet</h3></a></div>
    <div class="product-card"><a href="ss-pipes.html" style="text-decoration:none; color:inherit;"><img src="SS PIPE.jpg"><h3>SS PIPE</h3></a></div>
    </div>

<center><iframe src="https://www.youtube.com/embed/20wChqOnWXM" allowfullscreen></iframe></center>

<script>
    function toggleMenu() { document.getElementById('navMenu').classList.toggle('active'); }
    window.onload = () => document.getElementById('loader').style.display = 'none';
</script>

</body>
</html>
